name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            artifact: modbus-tui
            archive: modbus-tui-linux-x86_64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-14
            use_cross: false
            artifact: modbus-tui
            archive: modbus-tui-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false
            artifact: modbus-tui
            archive: modbus-tui-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            artifact: modbus-tui.exe
            archive: modbus-tui-windows-x86_64.zip

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Strip binary (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          docker run --rm -v "$PWD/target/${{ matrix.target }}/release:/work" \
            ghcr.io/cross-rs/${{ matrix.target }}:main \
            x86_64-linux-musl-strip /work/modbus-tui

      - name: Strip binary (macOS)
        if: contains(matrix.target, 'apple-darwin')
        run: strip target/${{ matrix.target }}/release/modbus-tui

      - name: Package (Unix)
        if: matrix.target != 'x86_64-pc-windows-msvc'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.artifact }}
          cd ../../..

      - name: Package (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.artifact }}" -DestinationPath "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*
